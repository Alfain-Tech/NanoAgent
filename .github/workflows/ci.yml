name: ci

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  SOLUTION_FILE: NanoAgent.slnx

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            NanoAgent/packages.lock.json
            NanoAgent.CLI/packages.lock.json
            NanoAgent.Desktop/packages.lock.json
            NanoAgent.Tests/packages.lock.json

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }} --locked-mode

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: warn
          retention-days: 14
